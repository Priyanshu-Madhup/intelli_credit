services:
  - type: web
    name: intelli-credit-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: FAISS_INDEX_PATH
        value: faiss_index.bin
      - key: FAISS_METADATA_PATH
        value: faiss_metadata.json
      - key: TOKEN_THRESHOLD
        value: "2000"
      - key: SERPER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
